# DigitalOcean App Platform — single CRC site (carib-recon.org)
# Repo: tafsir-ba/Carib
#
# squid-app: both components use Docker. Frontend dockerfile_path is Dockerfile
# (relative to source_dir frontend), NOT frontend/Dockerfile.

name: caribbean-reconnect
region: fra

services:
  - name: carib-backend
    dockerfile_path: Dockerfile
    source_dir: backend
    github:
      repo: tafsir-ba/Carib
      branch: main
      deploy_on_push: true
    http_port: 8001
    instance_size_slug: basic-xs
    instance_count: 1
    routes:
      - path: /api
        preserve_path_prefix: true
    health_check:
      http_path: /api/
      initial_delay_seconds: 60
      period_seconds: 30
      timeout_seconds: 10
    envs:
      - key: MONGO_URL
        scope: RUN_TIME
        type: SECRET
      - key: DB_NAME
        scope: RUN_TIME
        value: crc
      - key: CORS_ORIGINS
        scope: RUN_TIME
        value: "https://carib-recon.org,https://www.carib-recon.org"
      - key: GANTT_ORIGINS
        scope: RUN_TIME
        value: "https://carib-recon.org,https://www.carib-recon.org"
      - key: FRONTEND_URL
        scope: RUN_TIME
        value: "https://carib-recon.org"
      - key: GANTT_REGISTRATION_CLOSED
        scope: RUN_TIME
        value: "true"
      - key: PORT
        scope: RUN_TIME
        value: "8001"

  - name: carib-frontend
    dockerfile_path: Dockerfile
    source_dir: frontend
    github:
      repo: tafsir-ba/Carib
      branch: main
      deploy_on_push: true
    http_port: 80
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /
    envs:
      - key: REACT_APP_BACKEND_URL
        scope: BUILD_TIME
        value: ""
      - key: REACT_APP_CRC_SITE
        scope: BUILD_TIME
        value: "true"
      - key: REACT_APP_CARIB_SITE_URL
        scope: BUILD_TIME
        value: "https://carib-recon.org"
      - key: REACT_APP_LOGIN_URL
        scope: BUILD_TIME
        value: "https://carib-recon.org/login"
      - key: REACT_APP_GANTT_APP_URL
        scope: BUILD_TIME
        value: "https://carib-recon.org/gantt"
      - key: GENERATE_SOURCEMAP
        scope: BUILD_TIME
        value: "false"
      - key: CI
        scope: BUILD_TIME
        value: "true"
