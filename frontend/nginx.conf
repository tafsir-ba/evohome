server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy API calls to the FastAPI backend.
    # NOTE: On DigitalOcean App Platform, "/api" is routed to the backend by the
    # platform ingress, so this block is never hit there. It is only used by the
    # Docker Compose / Droplet setup (service name: backend).
    # Using a variable for the upstream defers DNS resolution to request time, so
    # nginx starts cleanly even when no host named "backend" exists (App Platform).
    location /api/ {
        resolver 127.0.0.11 8.8.8.8 valid=10s ipv6=off;
        set $crc_backend "backend:8001";
        proxy_pass http://$crc_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Single-page app: serve index.html for any unknown route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
